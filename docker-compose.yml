services:
  fileaccessapp:
    image: ${DOCKER_REGISTRY-}fileaccessapp
    build:
      context: .
      dockerfile: FileAccessApp/Dockerfile
    environment: 
    - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT} 
    - ASPNETCORE_URLS=http://+:8080 
    ports: 
      - "${HTTP_PORT}:8080" 
    env_file:
      - .env
    volumes:
      - ${ROOT_PATH}:/app/data/files
    restart: unless-stopped
